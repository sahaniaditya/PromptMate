<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptMate — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 520px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: #ede9fe;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6d28d9;
    }
    .brand-name { font-size: 18px; font-weight: 700; color: #111827; }
    .brand-tagline { font-size: 12px; color: #9ca3af; }

    h2 { font-size: 13px; font-weight: 600; color: #6b7280; letter-spacing: 0.05em; text-transform: uppercase; }

    .field-group { display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label { font-size: 13px; font-weight: 500; color: #374151; }

    .hint { font-size: 12px; color: #9ca3af; line-height: 1.4; }

    select, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .toggle-label { font-size: 13px; color: #374151; }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #7c3aed; }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    .divider { border: none; border-top: 1px solid #f3f4f6; }

    .actions { display: flex; gap: 10px; align-items: center; }

    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-ghost { background: none; color: #6b7280; }
    .btn-ghost:hover { background: #f3f4f6; }

    #status {
      font-size: 13px;
      color: #059669;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status.visible { opacity: 1; }
    #status.error { color: #dc2626; }

    .key-field { position: relative; }
    .key-field input { padding-right: 36px; }
    .key-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 14px;
      padding: 0;
    }
    .key-toggle:hover { color: #374151; }

    a { color: #7c3aed; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/>
          <path d="M17.8 11.8 19 13"/><path d="M15 9h.01"/>
          <path d="M17.8 6.2 19 5"/><path d="m13 13 9 9"/>
          <path d="M13.2 6.2 12 5"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">PromptMate</div>
        <div class="brand-tagline">Thinks before you send.</div>
      </div>
    </div>

    <hr class="divider" />

    <!-- Provider -->
    <section>
      <h2>Provider</h2>
      <div class="field-group" style="margin-top:14px;">
        <div class="field">
          <label for="provider">LLM provider</label>
          <select id="provider">
            <option value="anthropic">Anthropic (Claude)</option>
            <option value="openai">OpenAI (GPT)</option>
          </select>
        </div>

        <div class="field">
          <label for="model">Model</label>
          <input type="text" id="model" placeholder="e.g. claude-haiku-4-5-20251001" />
        </div>

        <div class="field">
          <label for="apiKey">API key</label>
          <div class="key-field">
            <input type="password" id="apiKey" placeholder="sk-ant-… or sk-…" autocomplete="off" />
            <button class="key-toggle" id="toggleKey" type="button" aria-label="Show/hide key">👁</button>
          </div>
          <span class="hint" id="keyHint">
            Your key is stored locally and only sent to the provider.
            <a id="keyLink" href="https://console.anthropic.com/" target="_blank">Get an Anthropic key →</a>
          </span>
        </div>
      </div>
    </section>

    <hr class="divider" />

    <!-- Behaviour -->
    <section>
      <h2>Behaviour</h2>
      <div class="field-group" style="margin-top:14px;">
        <div class="toggle-row">
          <span class="toggle-label">Enable hotkey (Ctrl+Shift+E / ⌘⇧E)</span>
          <label class="toggle">
            <input type="checkbox" id="hotkeyEnabled" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Auto-dismiss "looks clear" toast</span>
          <label class="toggle">
            <input type="checkbox" id="autoDismiss" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>
    </section>

    <hr class="divider" />

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="save">Save settings</button>
      <button class="btn btn-ghost" id="reset">Reset to defaults</button>
      <span id="status"></span>
    </div>
  </div>

  <script src="./options.ts" type="module"></script>
</body>
</html>
